name: Desktop build

# Matrix build when product version increases on main, or via manual dispatch.
on:
  push:
    branches: [main]
    paths:
      - "apps/desktop/src-tauri/tauri.conf.json"
  workflow_dispatch:
    inputs:
      force_build:
        description: "Build even if version did not increase"
        type: boolean
        default: true

jobs:
  version-check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect version upgrade
        id: check
        run: |
          FILE=apps/desktop/src-tauri/tauri.conf.json
          CURRENT=$(jq -r .version "$FILE")
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_build }}" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREV=$(git show "${{ github.event.before }}:$FILE" 2>/dev/null | jq -r .version || echo "0.0.0")
          if [ "$CURRENT" != "$PREV" ] && [ "$(printf '%s\n%s\n' "$PREV" "$CURRENT" | sort -V | tail -n1)" = "$CURRENT" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version-check
    if: needs.version-check.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      # Prefer Corepack over pnpm/action-setup: standalone mode crashes while
      # switching versions (integrity undefined), and the npm self-installer
      # breaks on Node 24 runners.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install pnpm from packageManager
        working-directory: apps/desktop
        run: corepack install

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        working-directory: apps/desktop
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('apps/desktop/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app (unsigned)
        working-directory: apps/desktop
        run: pnpm tauri build

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: taurvia-linux-unsigned-${{ needs.version-check.outputs.version }}
          path: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: taurvia-windows-unsigned-${{ needs.version-check.outputs.version }}
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 14

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: taurvia-macos-unsigned-${{ needs.version-check.outputs.version }}
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app
          if-no-files-found: warn
          retention-days: 14
